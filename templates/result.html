<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Результаты | Фишинг-детектор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Courier New', 'Segoe UI', monospace;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .result-card {
            background: rgba(0, 0, 0, 0.85);
            border-radius: 20px;
            padding: 40px;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
            margin-bottom: 30px;
        }

        h1 {
            text-align: center;
            color: #00ffcc;
            font-size: 32px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #00ffcc;
        }

        .stats {
            text-align: center;
            margin-bottom: 30px;
        }

        .score-badge {
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid #00ffcc;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .score-label {
            color: #ff6b6b;
            font-size: 14px;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .score-number {
            font-size: 64px;
            color: #00ffcc;
            font-weight: bold;
            margin: 10px 0;
        }

        .score-percent {
            font-size: 28px;
            color: #fff;
        }

        .progress-bar {
            width: 100%;
            height: 35px;
            background: #001a1a;
            border-radius: 20px;
            overflow: hidden;
            margin: 20px 0;
            border: 1px solid #00ffcc;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ffcc, #0066ff);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
        }

        .message-box {
            background: rgba(0, 255, 204, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            color: #fff;
        }

        .answers-section {
            margin-top: 30px;
        }

        .answers-title {
            color: #00ffcc;
            font-size: 24px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #00ffcc;
        }

        .answers-list {
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: 30px;
        }

        .answer-item {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid;
        }

        .answer-correct {
            border-left-color: #00ff44;
        }

        .answer-wrong {
            border-left-color: #ff4444;
        }

        .question-text {
            color: #fff;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .answer-details {
            font-size: 13px;
            margin-left: 20px;
            line-height: 1.5;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn {
            background: transparent;
            border: 2px solid #00ffcc;
            color: #00ffcc;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
        }

        .btn-primary {
            background: #00ffcc;
            color: #000;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 12px;
        }

        .answers-list::-webkit-scrollbar {
            width: 8px;
        }

        .answers-list::-webkit-scrollbar-track {
            background: #001a1a;
            border-radius: 4px;
        }

        .answers-list::-webkit-scrollbar-thumb {
            background: #00ffcc;
            border-radius: 4px;
        }

        /* СТИЛИ ДЛЯ ПЕЧАТИ - ТОЛЬКО САМОЕ ВАЖНОЕ */
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }

            .result-card {
                background: white;
                border: none;
                box-shadow: none;
                padding: 15px;
                margin: 0;
            }

            h1 {
                color: black;
                font-size: 20px;
                margin-bottom: 15px;
                padding-bottom: 8px;
                border-bottom: 1px solid #ccc;
            }

            .score-badge {
                background: #f0f0f0;
                border: 1px solid #ccc;
                padding: 10px;
                margin-bottom: 10px;
            }

            .score-label {
                color: #333;
                font-size: 12px;
            }

            .score-number {
                color: black;
                font-size: 28px;
            }

            .score-percent {
                color: #333;
                font-size: 16px;
            }

            .progress-bar,
            .message-box,
            .buttons,
            .footer {
                display: none;
            }

            .answers-title {
                color: black;
                font-size: 16px;
                margin: 15px 0 10px 0;
                padding-bottom: 5px;
                border-bottom: 1px solid #ccc;
            }

            .answers-list {
                max-height: none;
                overflow: visible;
                margin-bottom: 0;
            }

            .answer-item {
                background: white;
                padding: 8px;
                margin-bottom: 8px;
                border-left-width: 3px;
                page-break-inside: avoid;
            }

            .question-text {
                color: black;
                font-size: 12px;
                margin-bottom: 5px;
            }

            .answer-details {
                font-size: 11px;
                margin-left: 15px;
            }

            .explanation {
                display: none;
            }

            .correct-answer,
            .wrong-answer {
                color: black;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="result-card">
            <h1>📊 РЕЗУЛЬТАТЫ ТЕСТИРОВАНИЯ</h1>

            <div class="stats">
                <div class="score-badge">
                    <div class="score-label">[ СИСТЕМА БЕЗОПАСНОСТИ ]</div>
                    <div class="score-number" id="scoreNumber"></div>
                    <div class="score-percent" id="scorePercent"></div>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>

                <div class="message-box" id="resultMessage"></div>
            </div>

            <div class="answers-section">
                <div class="answers-title">📋 РАЗБОР ВОПРОСОВ</div>
                <div class="answers-list" id="answersList"></div>
            </div>

            <div class="buttons">
                <button class="btn" onclick="window.location.href='/'">🔄 НОВАЯ ИГРА</button>
                <button class="btn btn-primary" onclick="window.print()">🖨️ РАСПЕЧАТАТЬ</button>
            </div>

            <div class="footer">
                [ СКАНИРОВАНИЕ ЗАВЕРШЕНО ] [ СИСТЕМА ЗАЩИЩЕНА ]
            </div>
        </div>
    </div>

    <script>
        // Данные из Flask
        const score = {{ score }};
        const total = {{ total }};
        const percent = {{ percent }};
        const answers = {{ answers | tojson }};

        // Заполняем статистику
        document.getElementById('scoreNumber').innerHTML = score + ' / ' + total;
        document.getElementById('scorePercent').innerHTML = percent.toFixed(1) + '%';

        // Прогресс-бар
        const percentValue = Math.round(percent);
        const progressFill = document.getElementById('progressFill');
        progressFill.style.width = percentValue + '%';
        if (percentValue > 30) {
            progressFill.innerHTML = percentValue + '%';
        }

        // Сообщение
        const messageDiv = document.getElementById('resultMessage');
        let messageText = '';
        if (percent >= 80) {
            messageText = '🎉 ОТЛИЧНО! Вы эксперт по кибербезопасности!';
        } else if (percent >= 60) {
            messageText = '👍 ХОРОШИЙ РЕЗУЛЬТАТ! Неплохо, но есть куда расти.';
        } else if (percent >= 40) {
            messageText = '📚 СТОИТ ПОВТОРИТЬ правила кибербезопасности.';
        } else {
            messageText = '⚠️ БУДЬТЕ ОСТОРОЖНЫ! Нужно больше практики.';
        }
        messageDiv.innerHTML = messageText;

        // Заполняем список ответов
        const answersList = document.getElementById('answersList');
        answersList.innerHTML = '';

        for (let i = 0; i < answers.length; i++) {
            const answer = answers[i];
            const answerDiv = document.createElement('div');
            answerDiv.className = 'answer-item ' + (answer.correct ? 'answer-correct' : 'answer-wrong');

            const userAnswerText = answer.user_answer === 'phishing' ? '🎣 ФИШИНГ' : '✅ НЕ ФИШИНГ';
            const correctAnswerText = answer.is_phishing ? '🎣 ФИШИНГ' : '✅ НЕ ФИШИНГ';

            answerDiv.innerHTML = `
                <div class="question-text">
                    <strong>${i + 1}.</strong> ${answer.text}
                </div>
                <div class="answer-details">
                    <div>👉 Ваш ответ: ${userAnswerText}</div>
                    <div>✓ Правильный ответ: ${correctAnswerText}</div>
                </div>
            `;
            answersList.appendChild(answerDiv);
        }
    </script>
</body>

</html>
