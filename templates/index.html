<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фишинг-детектор</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="monitor">
        <div class="monitor-screen">
            <div class="screen-bezel">
                <div class="screen-content">
                    <div class="terminal-header">
                        <div class="terminal-dots">
                            <div class="terminal-dot dot-red"></div>
                            <div class="terminal-dot dot-yellow"></div>
                            <div class="terminal-dot dot-green"></div>
                        </div>
                        <div class="terminal-title">phishing_detector.exe</div>
                    </div>

                    <div class="game-info">
                        <div class="score">Счет: <span id="score">0</span></div>
                        <div class="progress">Вопрос <span id="current">1</span> / <span id="total">0</span></div>
                    </div>

                    <div class="question-card">
                        <p id="question-text">Загрузка системы безопасности...</p>
                    </div>

                    <div class="actions-container">
                        <div class="answer-buttons" id="answerButtons">
                            <button class="btn phishing" onclick="answer('phishing')">🎣 Фишинг</button>
                            <button class="btn legit" onclick="answer('legit')">✅ Обычное сообщение</button>
                        </div>
                        <button class="next-btn hidden" id="nextBtn" onclick="nextQuestion()">-> Следующий
                            вопрос</button>
                        <div id="message" class="message"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="monitor-stand"></div>
    </div>

    <script>
        let currentQid = 1;
        let totalQuestions = 0;
        let waitingForNext = false;

        function loadQuestion() {
            fetch('/question')
                .then(response => response.json())
                .then(data => {
                    if (!data.finished) {
                        document.getElementById('question-text').innerHTML = data.text;
                        document.getElementById('score').innerText = data.score;
                        document.getElementById('current').innerText = data.id;
                        document.getElementById('total').innerText = data.total;
                        totalQuestions = data.total;
                        currentQid = data.id;

                        document.querySelectorAll('.btn').forEach(btn => {
                            btn.disabled = false;
                        });

                        document.getElementById('answerButtons').classList.remove('hidden');
                        document.getElementById('nextBtn').classList.add('hidden');
                        document.getElementById('message').innerHTML = '';

                        waitingForNext = false;
                    } else {
                        window.location.href = '/result';
                    }
                });
        }

        function answer(userAnswer) {
            if (waitingForNext) return;

            document.querySelectorAll('.btn').forEach(btn => btn.disabled = true);

            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="correct">⏳ Обработка...</div>`;

            fetch('/answer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ answer: userAnswer })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.correct) {
                        messageDiv.innerHTML = `<div class="correct">✓ ПРАВИЛЬНО! ${data.explanation}</div>`;
                    } else {
                        messageDiv.innerHTML = `<div class="wrong">✗ ОШИБКА! ${data.explanation}</div>`;
                    }

                    document.getElementById('score').innerText = data.score;

                    if (data.finished) {
                        document.getElementById('answerButtons').classList.add('hidden');
                        const nextBtn = document.getElementById('nextBtn');
                        nextBtn.innerHTML = '🏆 ЗАВЕРШИТЬ ТЕСТ';
                        nextBtn.classList.remove('hidden');
                        waitingForNext = true;
                    } else {
                        document.getElementById('answerButtons').classList.add('hidden');
                        document.getElementById('nextBtn').classList.remove('hidden');
                        waitingForNext = true;
                    }
                });
        }

        function nextQuestion() {
            fetch('/question')
                .then(response => response.json())
                .then(data => {
                    if (data.finished) {
                        window.location.href = '/result';
                    } else {
                        loadQuestion();
                    }
                });
        }

        loadQuestion();
    </script>
</body>

</html>
