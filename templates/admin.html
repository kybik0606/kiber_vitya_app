<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель результатов</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #667eea;
            color: white;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .rank-1 {
            background: #ffd700;
        }

        .rank-2 {
            background: #c0c0c0;
        }

        .rank-3 {
            background: #cd7f32;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📊 Таблица лидеров</h1>

        <table>
            <thead>
                <tr>
                    <th>Место</th>
                    <th>ID участника</th>
                    <th>Время</th>
                    <th>Результат</th>
                    <th>Процент</th>
                </tr>
            </thead>
            <tbody>
                {% for result in results %}
                <tr
                    class="{% if loop.index == 1 %}rank-1{% elif loop.index == 2 %}rank-2{% elif loop.index == 3 %}rank-3{% endif %}">
                    <td>{{ loop.index }}</td>
                    <td>{{ result.user_id }}</td>
                    <td>{{ result.timestamp[:19] }}</td>
                    <td>{{ result.score }} / {{ result.total }}</td>
                    <td>{{ "%.1f"|format(result.percent) }}%</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <div style="margin-top: 20px;">
            <button onclick="window.location.href='/'">← На главную</button>
        </div>
    </div>
</body>

</html>
